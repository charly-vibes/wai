# Release workflow - build cross-platform binaries and publish a GitHub release
#
# Triggered by pushing a version tag (e.g., `git tag v0.1.0 && git push --tags`).
# Creates a GitHub Release with pre-built binaries for Linux, macOS, and Windows,
# then auto-updates the homebrew-charly tap formula and scoop-charly bucket manifest.
#
# Required secrets:
#   GITHUB_TOKEN       - automatically provided by GitHub Actions
#   TAP_GITHUB_TOKEN   - PAT with repo write access to homebrew-charly and scoop-charly

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux

      - name: Install aarch64 cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build x86_64 Linux
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Build aarch64 Linux
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Stage binaries
        run: |
          mkdir -p bins/linux_amd64 bins/linux_arm64
          cp target/x86_64-unknown-linux-gnu/release/wai bins/linux_amd64/wai
          cp target/aarch64-unknown-linux-gnu/release/wai bins/linux_arm64/wai

      - uses: actions/upload-artifact@v4
        with:
          name: bins-linux
          path: bins/
          retention-days: 1

  build-darwin:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: darwin

      - name: Build x86_64 macOS
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Build aarch64 macOS
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Stage binaries
        run: |
          mkdir -p bins/darwin_amd64 bins/darwin_arm64
          cp target/x86_64-apple-darwin/release/wai bins/darwin_amd64/wai
          cp target/aarch64-apple-darwin/release/wai bins/darwin_arm64/wai

      - uses: actions/upload-artifact@v4
        with:
          name: bins-darwin
          path: bins/
          retention-days: 1

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows

      - name: Build x86_64 Windows
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p bins/windows_amd64
          cp target/x86_64-pc-windows-msvc/release/wai.exe bins/windows_amd64/wai.exe

      - uses: actions/upload-artifact@v4
        with:
          name: bins-windows
          path: bins/
          retention-days: 1

  publish:
    name: Publish Release
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: bins-*
          path: bins/
          merge-multiple: true

      - name: Package archives and checksums
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          mkdir -p dist
          tar -czf "dist/wai_${VERSION}_linux_amd64.tar.gz"  -C bins/linux_amd64  wai
          tar -czf "dist/wai_${VERSION}_linux_arm64.tar.gz"  -C bins/linux_arm64  wai
          tar -czf "dist/wai_${VERSION}_darwin_amd64.tar.gz" -C bins/darwin_amd64 wai
          tar -czf "dist/wai_${VERSION}_darwin_arm64.tar.gz" -C bins/darwin_arm64 wai
          (cd bins/windows_amd64 && zip "../../dist/wai_${VERSION}_windows_amd64.zip" wai.exe)
          cd dist && sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub release
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.pkg.outputs.version }}"
          PRERELEASE=""
          [[ "${TAG}" == *-* ]] && PRERELEASE="--prerelease"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            $PRERELEASE \
            dist/wai_${VERSION}_linux_amd64.tar.gz \
            dist/wai_${VERSION}_linux_arm64.tar.gz \
            dist/wai_${VERSION}_darwin_amd64.tar.gz \
            dist/wai_${VERSION}_darwin_arm64.tar.gz \
            dist/wai_${VERSION}_windows_amd64.zip \
            dist/checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.pkg.outputs.version }}"
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/charly-vibes/homebrew-charly.git" /tmp/tap
          python3 scripts/update-homebrew.py \
            /tmp/tap/Formulas/wai.rb \
            "${VERSION}" "${TAG}" dist/checksums.txt
          cd /tmp/tap
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add Formulas/wai.rb
          git diff --staged --quiet || git commit -m "Update wai to ${VERSION}"
          git push

      - name: Update Scoop bucket
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.pkg.outputs.version }}"
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/charly-vibes/scoop-charly.git" /tmp/scoop
          python3 scripts/update-scoop.py \
            /tmp/scoop/bucket/wai.json \
            "${VERSION}" "${TAG}" dist/checksums.txt
          cd /tmp/scoop
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add bucket/wai.json
          git diff --staged --quiet || git commit -m "Update wai to ${VERSION}"
          git push
