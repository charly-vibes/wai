version: 2
project_name: wai

builds:
  - builder: prebuilt
    binary: wai
    # Binaries are built by platform-specific CI jobs and staged under bins/.
    # Linux (ubuntu): x86_64-unknown-linux-gnu + aarch64-unknown-linux-gnu (cross via gcc-aarch64-linux-gnu)
    # macOS (macos-latest): x86_64-apple-darwin + aarch64-apple-darwin
    # Windows (windows-latest): x86_64-pc-windows-msvc
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    prebuilt:
      path: "bins/{{ .Os }}_{{ .Arch }}/{{ .Binary }}{{ .Ext }}"

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

brews:
  - name: wai
    repository:
      owner: charly-vibes
      name: homebrew-charly
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    folder: Formula
    homepage: "https://github.com/charly-vibes/wai"
    description: "Workflow manager for AI-driven development"
    license: "MIT"
    test: |
      system "#{bin}/wai", "--version"

scoops:
  - name: wai
    repository:
      owner: charly-vibes
      name: scoop-charly
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    folder: bucket
    homepage: "https://github.com/charly-vibes/wai"
    description: "Workflow manager for AI-driven development"
    license: "MIT"

release:
  github:
    owner: charly-vibes
    name: wai
  prerelease: auto
  name_template: "{{ .Tag }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude: ['^docs:', '^chore:', '^style:', '^test:', '^refactor:']
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
