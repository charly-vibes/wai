# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information
#
# Install: prek install
# Bypass (WIP only): git commit --no-verify / git push --no-verify
#
# ⚠️  --no-verify requires:
#   - Commit message MUST contain "WIP" or "wip"
#   - Tests MUST be fixed before merging
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"
hooks = [
    { id = "cargo-fmt-check", name = "cargo fmt", entry = "cargo fmt -- --check", language = "system", types = ["rust"], pass_filenames = false },
    { id = "cargo-clippy",    name = "cargo clippy", entry = "cargo clippy -- -D warnings", language = "system", types = ["rust"], pass_filenames = false },
    { id = "pre-push-tests",  name = "tests", entry = "just pre-push", language = "system", pass_filenames = false, stages = ["pre-push"] },
]
